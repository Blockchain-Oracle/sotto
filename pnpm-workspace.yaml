packages:
  - apps/*
  - packages/*
  - spikes/*

allowBuilds:
  esbuild: true

# next lists sharp (and its LGPL libvips binaries) as an optional image
# optimizer; no surface here uses next/image optimization, and the LGPL
# artifact fails the repository license gate, so it is never installed.
ignoredOptionalDependencies:
  - sharp

catalog:
  "@canton-network/core-ledger-proto": 1.7.0
  "@canton-network/core-provider-dapp": 1.8.0
  "@canton-network/core-tx-visualizer": 1.7.0
  # @canton-network/wallet-sdk stays a literal pin in spikes/capability-wallet;
  # its provenance test locks the exact specifier and artifact integrity.
  "@eslint/js": 10.0.1
  # Design QA only (scripts/shoot.mjs). Browser binaries are NOT downloaded
  # by install; shoot.mjs falls back to the system Chrome channel.
  "@playwright/test": 1.61.1
  "@fastify/cookie": 11.1.2
  "@fastify/cors": 11.3.0
  "@radix-ui/react-dialog": 1.1.19
  "@radix-ui/react-select": 2.3.3
  "@radix-ui/react-tabs": 1.1.17
  "@radix-ui/react-tooltip": 1.2.12
  "@secretlint/secretlint-rule-preset-recommend": 13.0.2
  "@testing-library/dom": 10.4.1
  "@testing-library/react": 16.3.2
  "@types/node": 24.13.3
  "@types/pg": 8.20.0
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@vitejs/plugin-react": 6.0.3
  "@types/mdx": 2.0.14
  eslint: 10.7.0
  fastify: 5.10.0
  fumadocs-core: 16.11.5
  # fumadocs-mdx stays on 14.x: 15.x adds the yuku-analyzer native binding,
  # whose platform package publishes no license field and fails the
  # repository license gate.
  fumadocs-mdx: 14.3.2
  fumadocs-ui: 16.11.5
  globals: 17.7.0
  next: 16.2.10
  happy-dom: 20.11.0
  node-pg-migrate: 8.0.4
  pg: 8.22.0
  prettier: 3.9.5
  react: 19.2.7
  react-dom: 19.2.7
  secretlint: 13.0.2
  tsup: 8.5.1
  tsx: 4.23.0
  turbo: 2.10.5
  typescript: 6.0.3
  typescript-eslint: 8.63.0
  vite: 8.1.5
  vitest: 4.1.10

minimumReleaseAgeExclude:
  - happy-dom@20.11.0

saveExact: true
strictPeerDependencies: true
