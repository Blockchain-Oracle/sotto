name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          check-latest: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21.0.11+10"
          check-latest: false

      - name: Install DPM launcher
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/dpm.tar.gz"
          url="https://github.com/digital-asset/dpm/releases/download/1.0.21/dpm-1.0.21-linux-amd64.tar.gz"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 "$url" -o "$archive"
          echo "71061e3ecee029bc88ccfc1b51367e3257162f3bd91c7edcc688af503fef5e59  $archive" | sha256sum --check -
          mkdir -p "$RUNNER_TEMP/dpm" "$HOME/.dpm/bin"
          tar -xzf "$archive" -C "$RUNNER_TEMP/dpm"
          install -m 0755 "$RUNNER_TEMP/dpm/dpm" "$HOME/.dpm/bin/dpm"
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Install Daml SDK
        run: |
          dpm install 3.5.2
          test "$(dpm version --active)" = "3.5.2"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify
        run: corepack pnpm verify
